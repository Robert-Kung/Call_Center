services:
  callcenter-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    container_name: callcenter-app
    ports:
      - "3100:3100"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      - ./tailwind.config.js:/app/tailwind.config.js
      - ./postcss.config.js:/app/postcss.config.js
      - ./.env:/app/.env
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3100
      # Token Server: 容器內透過 host.docker.internal 存取宿主機上的 token-server
      - TOKEN_SERVER_HOST=host.docker.internal
      - TOKEN_SERVER_PORT=3005
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["npm", "run", "dev"]
    restart: unless-stopped
    depends_on:
      - callcenter-token

  callcenter-token:
    image: node:20-alpine
    container_name: callcenter-token
    working_dir: /app
    ports:
      - "3005:3005"
    volumes:
      - ./token-server:/app
    env_file:
      - ./token-server/.env
    command: sh -c "npm install && npm start"
    restart: unless-stopped
