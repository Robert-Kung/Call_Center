services:
  ai-voice-assistant-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    container_name: ai-voice-assistant-dev
    ports:
      - "3100:3100"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      - ./tailwind.config.js:/app/tailwind.config.js
      - ./postcss.config.js:/app/postcss.config.js
      - ./.env:/app/.env
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      # 告訴 Vite proxy 轉發到 Docker 內部的 token-server service
      - TOKEN_SERVER_HOST=token-server
      - TOKEN_SERVER_PORT=3005
    command: ["npm", "run", "dev"]
    restart: unless-stopped
    depends_on:
      - token-server

  token-server:
    image: node:20-alpine
    container_name: gemini-token-server
    working_dir: /app
    ports:
      - "3005:3005"
    volumes:
      - ./token-server:/app
    env_file:
      - ./token-server/.env
    command: sh -c "npm install && npm start"
    restart: unless-stopped
